<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minta maaf ka yaaa cintakuuu? 🥺</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --accent-color: #ff4d6d;
            --box-bg: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            text-align: center;
        }

        /* Efek Bunga Sakura Gugur */
        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 2;
            background: var(--box-bg);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 450px;
            width: 90%;
            animation: fadeIn 1.5s ease-in-out;
        }

        h1 {
            color: var(--accent-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #btn-mau {
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
        }

        #btn-mau:hover {
            transform: scale(1.1);
        }

        #btn-ga {
            background-color: #ccc;
            color: #333;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="container">
        <h1>Hi Sayang... 🥺</h1>
        <p>Minta maaf sayanggg sudah bikin sayanggg marah. Tidak tenang ka rasanya sayanggg begitu terus, sweedihhh bangettt. Jangan marah lagi yaa? ❤️</p>
        
        <div class="btn-container">
            <button id="btn-mau" onclick="maafDiterima()">Iya, Dimaafin</button>
            <button id="btn-ga" onmouseover="pindahTombol()">Enggakk!</button>
        </div>
    </div>

    <audio id="laguSedih" autoplay loop>
        <source src="Nangis.mp3" type="audio/mpeg">
    </audio>

    <audio id="laguYeay">
        <source src="Senang.mp3" type="audio/mpeg">
    </audio>

    <script>
        function pindahTombol() {
            const btnGa = document.getElementById('btn-ga');
            const x = Math.random() * (window.innerWidth - btnGa.clientWidth - 50);
            const y = Math.random() * (window.innerHeight - btnGa.clientHeight - 50);
            btnGa.style.position = 'fixed';
            btnGa.style.left = x + 'px';
            btnGa.style.top = y + 'px';
        }

        function maafDiterima() {
            // Menghentikan musik sedih
            const sedih = document.getElementById('laguSedih');
            sedih.pause();
            
            // Memutar musik Kucing Yeay
            const yeay = document.getElementById('laguYeay');
            yeay.play();

            // Menampilkan pesan pop-up kesenangan
            alert("Yeayyy!! telimakaci cayang 🥰. I love you ❤️");
        }

        function createParticle() {
            const particlesContainer = document.getElementById('particles');
            const particle = document.createElement('div');
            
            particle.style.position = 'absolute';
            particle.style.backgroundColor = '#ffb3c1';
            particle.style.width = Math.random() * 10 + 5 + 'px';
            particle.style.height = Math.random() * 10 + 5 + 'px';
            particle.style.borderRadius = '50%';
            particle.style.top = '-10px';
            particle.style.left = Math.random() * window.innerWidth + 'px';
            particle.style.opacity = Math.random();
            particle.style.transition = 'transform 4s linear, opacity 4s linear';
            
            particlesContainer.appendChild(particle);
            setTimeout(() => {
                particle.style.transform = `translateY(${window.innerHeight + 20}px) translateX(${Math.random() * 100 - 50}px) rotate(${Math.random() * 360}deg)`;
                particle.style.opacity = '0';
            }, 100);
            setTimeout(() => {
                particle.remove();
            }, 4000);
        }
        setInterval(createParticle, 300);
    </script>
</body>
</html>
